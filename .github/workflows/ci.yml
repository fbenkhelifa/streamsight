name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint tool
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run lint (syntax and runtime-name checks)
        run: ruff check . --select E9,F63,F7,F82
